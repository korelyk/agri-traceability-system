services:
  mysql:
    image: mysql:8.0
    container_name: agri-trace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: agritrace
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: agri-trace-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/agritrace?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_KEY_SECRET: ${APP_KEY_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://38.76.221.36:8088}
      BLOCKCHAIN_STATE_FILE: /data/blockchain-state.json
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - chain-data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VUE_APP_API_BASE_URL: /api
        VUE_APP_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://38.76.221.36:8088}
    container_name: agri-trace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  mysql-data:
  chain-data:
