server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: agri-traceability-system
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/agritrace?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.agritrace.entity

logging:
  level:
    com.agritrace: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

blockchain:
  difficulty: 4
  mining-reward: 100
  block-size: 10
  state-file: ${BLOCKCHAIN_STATE_FILE:${user.home}/.agritrace/blockchain-state.json}

app:
  name: Agri Traceability System
  version: 1.0.0
  public-base-url: ${PUBLIC_BASE_URL:http://38.76.221.36:8088}
  description: 基于区块链与数字签名的农产品防伪溯源系统
  security:
    jwt-secret: ${JWT_SECRET:change-this-jwt-secret-before-production}
    token-expire-hours: ${JWT_EXPIRE_HOURS:24}
    key-secret: ${APP_KEY_SECRET:change-this-key-secret-before-production}
